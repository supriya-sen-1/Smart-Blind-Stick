;==============================================================
; Project      : Smart Blind Stick
; Board        : ESP32 DevKit V1 (30-Pin)
; Framework    : Arduino
; IDE          : PlatformIO
; Author       : Supriya Sen
; License      : MIT
;==============================================================

[platformio]
default_envs = esp32dev

[env:esp32dev]

;--------------------------------------------------------------
; Platform
;--------------------------------------------------------------
platform = espressif32

;--------------------------------------------------------------
; Board
;--------------------------------------------------------------
board = esp32dev

;--------------------------------------------------------------
; Framework
;--------------------------------------------------------------
framework = arduino

;--------------------------------------------------------------
; Build Configuration
;--------------------------------------------------------------
build_type = release

;--------------------------------------------------------------
; Serial Monitor
;--------------------------------------------------------------
monitor_speed = 115200

monitor_filters =
    default
    esp32_exception_decoder
    time

;--------------------------------------------------------------
; Upload Configuration
;--------------------------------------------------------------
upload_speed = 115200
;--------------------------------------------------------------
; Library Dependencies
;--------------------------------------------------------------
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

;--------------------------------------------------------------
; Build Flags
;--------------------------------------------------------------
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Wall

;--------------------------------------------------------------
; Library Dependency Finder
;--------------------------------------------------------------
lib_ldf_mode = deep+

;--------------------------------------------------------------
; File System
;--------------------------------------------------------------
board_build.filesystem = littlefs

;--------------------------------------------------------------
; Extra Options
;--------------------------------------------------------------
check_tool = cppcheck

check_flags =
    cppcheck: --enable=all

;==============================================================
; End of Configuration
;==============================================================